# .github/workflows/daily_card.yml
#
# Envía "La Carta del Día" de Oath cada mañana a Telegram
# y actualiza el historial en el repo (evita el auto-disable de 60 días).

name: Carta del Día

on:
  # Cron en UTC. España peninsular:
  #   Invierno (CET  = UTC+1): 8 UTC → 9:00 local
  #   Verano   (CEST = UTC+2): 8 UTC → 10:00 local  (cambia a 7 si quieres las 9:00 en verano)
  schedule:
    - cron: "0 8 * * *"

  # Lanzamiento manual desde la pestaña Actions → útil para probar
  workflow_dispatch:

jobs:
  send-card:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesario para hacer git push del historial

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enviar carta del día
        id: send
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
        run: |
          CARD_ID=$(python send_daily_card.py)
          echo "card_id=$CARD_ID" >> $GITHUB_OUTPUT
          echo "Carta enviada: $CARD_ID"

      - name: Actualizar historial y commit
        env:
          CARD_ID: ${{ steps.send.outputs.card_id }}
        run: |
          TODAY=$(date -u +"%Y-%m-%d")

          # Crear historial si no existe
          [ -f history.json ] || echo "[]" > history.json

          # Añadir entrada (Python puro, sin jq)
          python3 - <<PYEOF
          import json, os

          history_file = "history.json"
          with open(history_file) as f:
              history = json.load(f)

          entry = {"date": "$TODAY", "card_id": os.environ["CARD_ID"]}

          if not history or history[-1]["date"] != entry["date"]:
              history.append(entry)
              with open(history_file, "w") as f:
                  json.dump(history, f, indent=2, ensure_ascii=False)
              print(f"Historial actualizado: {entry}")
          else:
              print("Entrada de hoy ya existe, sin cambios.")
          PYEOF

          # Commit solo si hay cambios
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add history.json
          git diff --cached --quiet && echo "Nada que commitear." && exit 0

          git commit -m "🃏 Carta del día: ${CARD_ID} (${TODAY})"
          git push
