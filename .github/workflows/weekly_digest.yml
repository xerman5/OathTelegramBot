# .github/workflows/weekly_digest.yml
#
# Envía el resumen semanal del universo Leder Games cada miércoles.

name: Resumen Semanal

on:
  # Miércoles a las 17:00 UTC = 18:00 invierno / 19:00 verano (España)
  schedule:
    - cron: "0 17 * * 3"   # 3 = miércoles

  # Lanzamiento manual para probar
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enviar resumen semanal
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
        run: python send_weekly_digestv2.py
